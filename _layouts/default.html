<!DOCTYPE html>
<html lang="en">
{% include head.html %}
<body class="site-body">

  <header class="site-header">
    <div class="container">
      <nav class="site-nav">
        <a href="/" class="site-brand">
          <svg class="brand-icon" viewBox="0 0 28 20" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <rect x="0" y="7" width="3" height="6" rx="1.5" fill="currentColor"/>
            <rect x="5" y="4" width="3" height="12" rx="1.5" fill="currentColor"/>
            <rect x="10" y="0" width="3" height="20" rx="1.5" fill="currentColor"/>
            <rect x="15" y="4" width="3" height="12" rx="1.5" fill="currentColor"/>
            <rect x="20" y="7" width="3" height="6" rx="1.5" fill="currentColor"/>
            <rect x="25" y="9" width="3" height="2" rx="1" fill="currentColor"/>
          </svg>
          <span class="brand-name">{{ site.title }}</span>
        </a>
        <div class="nav-links">
          <a href="/" class="nav-link">Home</a>
          <a href="/archive" class="nav-link">Blog &amp; Guides</a>
          <a href="/faq/" class="nav-link">FAQ</a>
          <a href="/feed.xml" class="nav-link nav-rss" title="RSS Feed">
            <svg viewBox="0 0 24 24" fill="currentColor" width="15" height="15" aria-hidden="true"><path d="M6.18 15.64a2.18 2.18 0 0 1 2.18 2.18C8.36 19.01 7.38 20 6.18 20C4.98 20 4 19.01 4 17.82a2.18 2.18 0 0 1 2.18-2.18M4 4.44A15.56 15.56 0 0 1 19.56 20h-2.83A12.73 12.73 0 0 0 4 7.27V4.44m0 5.66a9.9 9.9 0 0 1 9.9 9.9h-2.83A7.07 7.07 0 0 0 4 12.93V10.1z"/></svg>
          </a>
        </div>
      </nav>
    </div>
  </header>

  <main class="site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-left">
        <p class="footer-brand">{{ site.title }}</p>
        <p class="footer-tagline">{{ site.description }}</p>
      </div>
      <div class="footer-right">
        <a href="/faq/" class="footer-link">FAQ</a>
        <a href="/archive" class="footer-link">Blog &amp; Guides</a>
        <a href="/feed.xml" class="footer-link">RSS Feed</a>
      </div>
    </div>
    <div class="container footer-bottom">
      <p>Independent writing on AI audio stem separation technology</p>
    </div>
  </footer>

</body>
</html>
